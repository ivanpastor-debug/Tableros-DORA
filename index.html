<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tableros DORA · Productividad</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
:root{
  --bg:#0a0e17; --bg2:#0f1420; --card:#141b2b; --card2:#1a2333;
  --line:#222c41; --text:#e8ecf4; --muted:#8a95ab; --muted2:#5d6678;
  --accent:#6366f1; --accent2:#a855f7; --grad:linear-gradient(135deg,#6366f1,#a855f7);
  --ok:#10b981; --warn:#f59e0b; --bad:#ef4444; --info:#38bdf8;
  --shadow:0 10px 30px rgba(0,0,0,.35);
}
[data-theme="light"]{
  --bg:#f4f6fb; --bg2:#eef1f8; --card:#ffffff; --card2:#f7f9fd;
  --line:#e3e8f2; --text:#1a2030; --muted:#5a647a; --muted2:#98a1b5;
  --shadow:0 8px 24px rgba(40,50,90,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:-apple-system,'Segoe UI',Roboto,Inter,system-ui,sans-serif;
  background:radial-gradient(1200px 600px at 80% -10%,rgba(99,102,241,.10),transparent 60%),
             radial-gradient(900px 500px at -10% 10%,rgba(168,85,247,.08),transparent 55%),
             var(--bg);
  color:var(--text); min-height:100vh; transition:background .3s,color .3s;
}
.wrap{max-width:1320px;margin:0 auto;padding:22px 24px 60px}
header{display:flex;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:22px}
.brand{display:flex;align-items:center;gap:12px}
.logo{width:42px;height:42px;border-radius:12px;background:var(--grad);
  display:grid;place-items:center;font-weight:800;color:#fff;font-size:18px;box-shadow:var(--shadow)}
.brand h1{font-size:19px;font-weight:700;letter-spacing:-.3px;line-height:1.1}
.brand .sub{font-size:12px;color:var(--muted)}
.spacer{flex:1}
.pill{display:inline-flex;align-items:center;gap:7px;background:var(--card);
  border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:13px;color:var(--muted)}
.pill b{color:var(--text)}
.dot{width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 4px rgba(16,185,129,.15)}
select,.btn{
  background:var(--card);border:1px solid var(--line);color:var(--text);
  border-radius:12px;padding:10px 14px;font-size:14px;font-weight:600;cursor:pointer;
  transition:.15s;outline:none}
select:hover,.btn:hover{border-color:var(--accent)}
.btn.icon{width:42px;display:grid;place-items:center;padding:0;height:42px;font-size:17px}
input[type=date]{background:var(--card);border:1px solid var(--line);color:var(--text);
  border-radius:10px;padding:8px 10px;font-size:13px;font-weight:600;outline:none;
  font-family:inherit;cursor:pointer;color-scheme:dark}
[data-theme="light"] input[type=date]{color-scheme:light}
input[type=date]:hover{border-color:var(--accent)}
.filterbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.filterbar label{font-size:12px;color:var(--muted);font-weight:600;display:inline-flex;align-items:center;gap:6px}
.project-title{display:flex;align-items:baseline;gap:12px;margin:6px 2px 16px;flex-wrap:wrap}
.project-title h2{font-size:26px;font-weight:800;letter-spacing:-.5px}
.tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;
  padding:4px 10px;border-radius:7px;background:var(--card2);border:1px solid var(--line);color:var(--muted)}
.grid{display:grid;gap:16px}
.kpis{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));margin-bottom:16px}
.card{background:linear-gradient(180deg,var(--card),var(--card2));border:1px solid var(--line);
  border-radius:18px;padding:18px 20px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .label{font-size:12.5px;color:var(--muted);font-weight:600;display:flex;align-items:center;gap:7px}
.kpi .val{font-size:34px;font-weight:800;letter-spacing:-1px;margin-top:8px;line-height:1}
.kpi .val small{font-size:16px;font-weight:700;color:var(--muted)}
.kpi .foot{font-size:12px;color:var(--muted2);margin-top:8px}
.kpi .ic{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;font-size:14px}
.bar-mini{height:6px;border-radius:4px;background:var(--line);margin-top:12px;overflow:hidden}
.bar-mini > i{display:block;height:100%;border-radius:4px;background:var(--grad);transition:width 1s ease}
.charts{grid-template-columns:1.2fr .8fr}
.charts-2{grid-template-columns:1fr 1fr}
.card h3{font-size:14.5px;font-weight:700;margin-bottom:4px}
.card .hint{font-size:12px;color:var(--muted);margin-bottom:12px}
.chart{width:100%;height:300px}
.chart.tall{height:330px}
@media(max-width:900px){.charts,.charts-2{grid-template-columns:1fr}}
.legendrow{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:12px;color:var(--muted)}
.legendrow span{display:inline-flex;align-items:center;gap:6px}
.sw{width:10px;height:10px;border-radius:3px}
footer{margin-top:30px;text-align:center;color:var(--muted2);font-size:12px}
.fade{animation:fade .4s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* tabla consolidada (pivot) */
.pivwrap{overflow:auto;border:1px solid var(--line);border-radius:12px;max-height:440px}
table.piv{border-collapse:separate;border-spacing:0;font-size:12px;white-space:nowrap;min-width:100%}
table.piv th,table.piv td{padding:6px 11px;text-align:center;border-bottom:1px solid var(--line)}
table.piv thead th{position:sticky;top:0;background:var(--card2);z-index:2;font-weight:700;color:var(--muted);font-size:11px}
table.piv tbody th{position:sticky;left:0;background:var(--card2);z-index:1;text-align:left;font-weight:700;color:var(--text)}
table.piv thead th:first-child{left:0;z-index:3}
table.piv tr.tot th,table.piv tr.tot td{font-weight:800;border-top:2px solid var(--line);background:var(--card)}
table.piv tr.tot th{background:var(--card2)}
.cpos{color:#10b981;font-weight:700}.cneg{color:#ef4444;font-weight:700}.czero{color:var(--muted2)}
.sw-i{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:7px;vertical-align:middle}
/* recursos del equipo (interno) */
.rcard h3{display:flex;align-items:center;gap:10px}
.rrow{display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin:8px 0 16px}
.rbig{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:104px;
  padding:12px 18px;border-radius:16px;background:var(--grad);color:#fff;box-shadow:var(--shadow)}
.rbign{font-size:34px;font-weight:800;line-height:1}
.rbigl{font-size:11px;opacity:.9;margin-top:5px;text-transform:uppercase;letter-spacing:.5px}
.rchips{display:flex;gap:10px;flex-wrap:wrap}
.rchip{display:inline-flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--line);
  border-radius:999px;padding:8px 14px;font-size:13px;color:var(--muted);cursor:pointer;transition:.15s;user-select:none}
.rchip:hover{border-color:var(--accent)}
.rchip.on{border-color:var(--accent);background:var(--accent);color:#fff;box-shadow:var(--shadow)}
.rchip.on b{color:#fff}
.rchip.rclear{color:var(--muted);font-weight:700}
.rchip b{color:var(--text);font-size:16px}
.rdot{width:10px;height:10px;border-radius:3px;display:inline-block}
.costrow{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.costbox{border:1px solid var(--line);border-left:5px solid var(--c);border-radius:16px;padding:16px 18px;
  background:linear-gradient(180deg,var(--card),var(--card2))}
.rsub{font-size:12.5px;font-weight:700;color:var(--muted);margin:4px 0 10px}
.cbl{font-size:12.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.cbv{font-size:30px;font-weight:800;letter-spacing:-1px;margin-top:8px;color:var(--text)}
.cbs{font-size:11px;color:var(--muted2);margin-top:4px}
@media(max-width:700px){.costrow{grid-template-columns:1fr}}
/* carga por responsable + panel de alertas (interno) */
.dwrap{overflow:auto;border:1px solid var(--line);border-radius:12px;max-height:470px}
.dtbl{width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px;white-space:nowrap;min-width:100%}
.dtbl th,.dtbl td{padding:8px 12px;border-bottom:1px solid var(--line);text-align:left}
.dtbl thead th{position:sticky;top:0;background:var(--card2);color:var(--muted);font-weight:700;
  font-size:11px;text-transform:uppercase;letter-spacing:.4px;z-index:2}
.dtbl th.num,.dtbl td.num{text-align:right;font-variant-numeric:tabular-nums}
.dtbl tbody tr.rclk{cursor:pointer}
.dtbl tbody tr.rclk:hover{background:var(--card2)}
.dtbl tr.rdetail td{background:var(--bg2);font-size:12px;color:var(--muted)}
.caret{display:inline-block;width:12px;color:var(--accent);font-weight:800}
.chip2{display:inline-block;padding:2px 9px;border-radius:6px;background:var(--card2);
  border:1px solid var(--line);font-size:11px;color:var(--text);font-weight:700}
.tbar{height:7px;width:74px;border-radius:4px;background:var(--line);overflow:hidden;
  display:inline-block;vertical-align:middle;margin-right:8px}
.tbar > i{display:block;height:100%;border-radius:4px;background:var(--grad)}
.abadge{display:inline-block;min-width:40px;text-align:center;padding:3px 8px;border-radius:7px;
  font-weight:800;font-size:11.5px;color:#fff}
.muted{color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <div class="logo">D</div>
      <div>
        <h1>Tableros DORA</h1>
        <div class="sub">Productividad y métricas de entrega · Linktic</div>
      </div>
    </div>
    <div class="spacer"></div>
    <span class="pill"><span class="dot"></span> Corte <b id="corte">—</b> · actualizado <b id="actualizado">—</b></span>
    <select id="proySel" aria-label="Proyecto"></select>
    <button class="btn icon" id="themeBtn" title="Tema claro/oscuro">◐</button>
  </header>

  <div id="content"></div>

  <footer>
    Generado <span id="gen">—</span> (hora Colombia) · <span id="filas">—</span> registros HU×día ·
    fuente: snapshots Azure DevOps homologados
  </footer>
</div>
<script src="app.js"></script>
</body>
</html>
